name: Deploy web apps

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            web-maze-builder/package-lock.json
            web-hermite-spline-generator/package-lock.json

      - name: Install Maze Builder dependencies
        working-directory: web-maze-builder
        run: npm ci

      - name: Test Maze Builder
        working-directory: web-maze-builder
        run: npm test

      - name: Build Maze Builder
        working-directory: web-maze-builder
        run: npm run build

      - name: Install Hermite Spline Generator dependencies
        working-directory: web-hermite-spline-generator
        run: npm ci

      - name: Build Hermite Spline Generator
        working-directory: web-hermite-spline-generator
        run: npm run build

      - name: Assemble Pages artifact
        run: |
          mkdir -p pages/web-maze-builder pages/web-hermite-spline-generator
          cp -R web-maze-builder/dist/. pages/web-maze-builder/
          cp -R web-hermite-spline-generator/dist/. pages/web-hermite-spline-generator/
          touch pages/.nojekyll
          cat > pages/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="UTF-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1.0" />
              <title>Ball Maze Tools</title>
              <style>
                body { font-family: system-ui, sans-serif; max-width: 720px; margin: 48px auto; padding: 0 24px; line-height: 1.5; }
                a { color: #0f62fe; }
              </style>
            </head>
            <body>
              <h1>Ball Maze Tools</h1>
              <ul>
                <li><a href="./web-maze-builder/">Maze Builder</a></li>
                <li><a href="./web-hermite-spline-generator/">Hermite Spline Generator</a></li>
              </ul>
            </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
